    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
      .text-shadow-sm { text-shadow: 0 1px 2px rgba(0,0,0,0.1); }
      .text-shadow-md { text-shadow: 0 2px 4px rgba(0,0,0,0.2); }

      .bengali-text {
        font-family: 'Hind Siliguri', serif;
      }
    </style>

    <script>
      // Prevent libraries from trying to overwrite window.fetch which is a read-only getter in this environment
      (function() {
        var originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: false,
            enumerable: true,
            get: function() { return originalFetch; },
            set: function() { 
              console.warn('Attempt to overwrite window.fetch was blocked to prevent TypeError.');
            }
          });
        } catch (e) {
          console.log('Could not redefine fetch, it might already be protected.');
        }
      })();
    </script>
